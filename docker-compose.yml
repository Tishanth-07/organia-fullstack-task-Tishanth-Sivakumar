version: "3.9"

# ── Nintro Stack Orchestration ──────────────────────────────────────────────
# Defines the interconnected services for the full-stack application.
# All sensitive values are parameterized via the .env file.


services:

  # ── Section: Persistent Database ──────────────────────────────────────────
  # Standard PostgreSQL 16 image with health monitoring.
  db:
    image: postgres:16-alpine
    container_name: nintro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Section: .NET Core Backend ────────────────────────────────────────────
  # Handles API logic, authentication, and background services.
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: build
    container_name: nintro_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:${BACKEND_PORT:-5181}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      AutoMigrate: "true"
      EmailSettings__GoogleWebhookUrl: ${GOOGLE_WEBHOOK_URL}
      EmailSettings__GoogleWebhookSecret: ${GOOGLE_WEBHOOK_SECRET:-}
      EmailSettings__FromEmail: ${FROM_EMAIL}
      EmailSettings__FromName: ${FROM_NAME}
    ports:
      - "${BACKEND_PORT:-5181}:${BACKEND_PORT:-5181}"
    volumes:
      - ./backend:/src/backend
    working_dir: /src/backend
    command: dotnet watch run --project backend.csproj --urls http://0.0.0.0:5181

  # ── Section: Next.js Frontend ─────────────────────────────────────────────
  # High-performance user interface with real-time reactivity.
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: deps
    container_name: nintro_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: ${ASPNETCORE_ENVIRONMENT}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    command: npm run dev

# ── Section: Infrastructure Resources ───────────────────────────────────────

volumes:
  postgres_data:
    driver: local
    name: nintro_postgres_volume
