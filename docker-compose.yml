version: "3.9"

services:

  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: organia_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── .NET 8 Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: build
    container_name: organia_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5181
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      AutoMigrate: "true"
      EmailSettings__SmtpHost: ${SMTP_HOST}
      EmailSettings__SmtpPort: ${SMTP_PORT}
      EmailSettings__SmtpUser: ${SMTP_USER}
      EmailSettings__SmtpPassword: ${SMTP_PASS}
      EmailSettings__FromEmail: ${FROM_EMAIL}
      EmailSettings__FromName: ${FROM_NAME}
    ports:
      - "5181:5181"
    volumes:
      - ./backend:/src/backend
    working_dir: /src/backend
    command: dotnet watch run --project backend.csproj --urls http://0.0.0.0:5181

  # ─── Next.js 15 Frontend ──────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: deps
    container_name: organia_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: ${ASPNETCORE_ENVIRONMENT}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    command: npm run dev

volumes:
  postgres_data:
    driver: local
